appId: dev.unlimit.app
productName: UnLimit
directories:
  output: release
  buildResources: build
files:
  - out/**
  - resources/**
  - package.json
  - '!**/*.map'
extraResources:
  - from: resources/default-profiles.json
    to: default-profiles.json
win:
  icon: icon.ico
  target:
    - target: nsis
      arch: x64
    - target: portable
      arch: x64
  requestedExecutionLevel: requireAdministrator
  # Code signing with self-signed skuffix.dev cert (certs/skuffix-dev.pfx).
  # Pass password via CSC_KEY_PASSWORD env var; or override the whole cert via
  # CSC_LINK + CSC_KEY_PASSWORD for a real CA-issued one.
  signtoolOptions:
    certificateFile: certs/skuffix-dev.pfx
    certificateSubjectName: skuffix.dev
    signingHashAlgorithms:
      - sha256
    rfc3161TimeStampServer: http://timestamp.digicert.com
nsis:
  oneClick: false
  perMachine: true
  allowToChangeInstallationDirectory: true
  shortcutName: UnLimit
  artifactName: ${productName}-${version}-Setup.${ext}
portable:
  artifactName: ${productName}-${version}-Portable.${ext}
asar: true
